# ============================================================
# ECHO‑13 — Continuous Integration
# ============================================================
# Runs tests, linting, and import checks on every push and PR.
# File: .github/workflows/python-app.yml
# ============================================================

name: ECHO‑13 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # ── 1. Check out the repo ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      # ── 4. Lint with flake8 ───────────────────────────────
      #    First pass: stop on critical errors (syntax, undefined names)
      #    Second pass: warn on style issues (non-blocking)
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      # ── 5. Run tests with pytest ──────────────────────────
      - name: Run tests
        run: |
          pytest --verbose --tb=short

      # ── 6. Verify examples can be imported ────────────────
      #    Catches broken imports in the example scripts
      - name: Verify example imports
        run: |
          for f in examples/*.py; do
            echo "Checking: $f"
            python -c "import ast; ast.parse(open('$f').read())" || exit 1
          done
          echo "All examples parse successfully."
